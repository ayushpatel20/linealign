<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 320" width="100%" height="100%">
  <defs>
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1E88FF" />
      <stop offset="100%" stop-color="#2DD4BF" />
    </linearGradient>
  </defs>
  
  <!-- Stylized Orthodontic 'la' loop -->
  <path 
    d="M 185,60 
       L 185,135 
       C 185,160 205,178 235,178 
       C 265,178 290,152 290,122 
       C 290,92 260,78 235,90 
       C 210,102 195,128 208,152 
       C 220,172 245,178 270,178 
