    fill="none" 
    stroke="url(#logo-grad)" 
    stroke-width="14" 
    stroke-linecap="round" 
    stroke-linejoin="round"
  />
  
  <!-- Main Brand Text -->
  <text 
    x="250" 
    y="245" 
    font-family="system-ui, -apple-system, Inter, sans-serif" 
    font-size="48" 
    font-weight="300" 
    letter-spacing="14" 
    text-anchor="middle" 
    fill="url(#logo-grad)"
  >linealign</text>
  
  <!-- Tagline -->
  <text 
    x="250" 
    y="288" 
    font-family="system-ui, -apple-system, Poppins, sans-serif" 
    font-size="13" 
    font-weight="600" 
