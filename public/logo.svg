<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 255" width="100%" height="100%">
  <defs>
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1E88FF" />
      <stop offset="100%" stop-color="#2DD4BF" />
    </linearGradient>
  </defs>
  
  <!-- Stylized Orthodontic 'la' loop - Shifted up by 40px -->
  <path 
    d="M 185,20 
       L 185,95 
       C 185,120 205,138 235,138 
       C 265,138 290,112 290,82 
       C 290,52 260,38 235,50 
       C 210,62 195,88 208,112 
       C 220,132 245,138 270,138 
       L 295,138"
    fill="none" 
    stroke="url(#logo-grad)" 
    stroke-width="15" 
    stroke-linecap="round" 
    stroke-linejoin="round"
  />
  
  <!-- Main Brand Text - Bolder (500) and larger (52) for enhanced legibility -->
  <text 
    x="250" 
    y="200" 
    font-family="system-ui, -apple-system, Inter, sans-serif" 
    font-size="52" 
    font-weight="500" 
    letter-spacing="14" 
    text-anchor="middle" 
    fill="url(#logo-grad)"
  >linealign</text>
  
  <!-- Tagline - Bolder and shifted up -->
  <text 
    x="250" 
    y="240" 
    font-family="system-ui, -apple-system, Poppins, sans-serif" 
    font-size="13" 
    font-weight="700" 
    letter-spacing="6" 
    text-anchor="middle" 
    fill="#0f172a"
  >CLEAR COMFORT CONFIDENT.</text>
</svg>
